name: CI
on:
  push:
    branches:
    - main
    tags:
    - "v*"
  pull_request:

permissions:
  id-token: write
  attestations: write

jobs:
  test:
    runs-on: ${{ matrix.OS }}
    name: ${{ matrix.OS }} Scala ${{ matrix.SCALA_VERSION }}
    strategy:
      fail-fast: false
      matrix:
        OS: ["macos-13"]
        SCALA_VERSION: ["2.13.16"]
    steps:
    - name: Don't convert LF to CRLF during checkout
      if: runner.os == 'Windows'
      run: |
        git config --global core.autocrlf false
        git config --global core.eol lf
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/cache-action@v6.4
    - uses: coursier/setup-action@v1.3
      with:
        jvm: 21
    - run: sudo apt-get install -y nailgun
      if: runner.os == 'Linux'
    - run: |
        sudo installer -pkg "$(cs get https://github.com/canonical/multipass/releases/download/v1.15.1/multipass-1.15.1+mac-Darwin.pkg)" -target /
        sleep 20 # https://github.com/canonical/multipass/issues/3723
        multipass launch --verbose -n cs-docker-vm --cpus 2 --memory 2G --disk 4G
        echo "cs-docker-vm created"
      if: runner.os == 'macOS'
    # - run: .github/scripts/scala-native-setup.sh
    #   if: runner.os != 'Windows'
    - run: ./mill -i jvmTests --scalaVersion "$SCALA_VERSION"
      shell: bash
      env:
        SCALA_VERSION: ${{ matrix.SCALA_VERSION }}
        COURSIER_JNI: force
    - run: multipass delete cs-docker-vm && multipass purge
      if: runner.os == 'macOS'

  publish:
    needs: ["test"]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - uses: coursier/cache-action@v6.4
      - run: .github/scripts/gpg-setup.sh
        env:
          PGP_SECRET: ${{ secrets.PUBLISH_SECRET_KEY }}
      - uses: coursier/setup-action@v1.3
        with:
          jvm: 21
      - run: |
          mv .mill-jvm-opts .mill-jvm-opts.bak
          cat .mill-jvm-opts.bak | grep -v -- '-Xmx' > .mill-jvm-opts
          echo '-Xmx2g' >> .mill-jvm-opts

      - name: Release
        run: ./mill -i publishSonatype --tasks __.publishArtifacts
        env:
          PGP_PASSWORD: ${{ secrets.PUBLISH_SECRET_KEY_PASSWORD }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}

  upload-launchers:
    name: Upload launchers to GitHub release assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/cache-action@v6.4
    - uses: coursier/setup-action@v1.3
      with:
        jvm: 21
    - uses: actions/download-artifact@v4
      with:
        name: launchers-linux
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-linux-arm
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-windows
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-mac
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-mac-arm
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-linux-static
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-linux-arm-static
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-linux-mostly-static
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-linux-arm-mostly-static
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-linux-container
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-linux-arm-container
        path: artifacts/
    - uses: actions/download-artifact@v4
      with:
        name: launchers-jar
        path: artifacts/
    - run: ./mill -i uploadLaunchers --directory artifacts/
      env:
        UPLOAD_GH_TOKEN: ${{ secrets.GH_TOKEN }}

  update-brew-formula:
    name: Update brew formula
    needs: [upload-launchers]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - uses: coursier/cache-action@v6.4
      - uses: coursier/setup-action@v1.3
        with:
          jvm: 21
      - run: .github/scripts/scala-cli.sh .github/scripts/UpdateBrewFormula.scala
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  update-website-latest:
    name: Update website (snapshot)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: '12'
      - uses: coursier/cache-action@v6.4
      - uses: coursier/setup-action@v1.3
        with:
          jvm: 21
      - run: .github/scripts/setup-mkdocs.sh
      - run: npm install && export PATH="$PATH:$(pwd)/node_modules/bower/bin" && ./mill -i updateWebsite
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  update-website:
    name: Update website
    needs: update-brew-formula
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@v4
        with:
          node-version: '12'
      - uses: coursier/cache-action@v6.4
      - uses: coursier/setup-action@v1.3
        with:
          jvm: 21
      - run: .github/scripts/setup-mkdocs.sh
      - run: npm install && export PATH="$PATH:$(pwd)/node_modules/bower/bin" && ./mill -i updateWebsite
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
