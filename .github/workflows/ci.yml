name: CI
on:
  push:
    branches:
    - main
    tags:
    - "v*"
  pull_request:

permissions:
  id-token: write
  attestations: write

jobs:
  update-brew-formula:
    name: Update brew formula
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: coursier/setup-action@v3
        with:
          apps: scala-cli
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: scala-cli run --server=false .github/scripts/UpdateBrewFormula.scala
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  update-website-latest:
    name: Update website (snapshot)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: .github/scripts/setup-mkdocs.sh
      - run: npm install --ignore-scripts && ./mill -i updateWebsite
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  update-website:
    name: Update website
    needs:
      - update-brew-formula
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: .github/scripts/setup-mkdocs.sh
      - run: npm install --ignore-scripts && ./mill -i updateWebsite
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
