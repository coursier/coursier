name: CI
on:
  push:
    branches:
    - main
    tags:
    - "v*"
  pull_request:

permissions:
  id-token: write
  attestations: write

jobs:
  generate-native-launchers:
    name: ${{ matrix.OS }} native
    runs-on: ${{ matrix.OS }}
    strategy:
      fail-fast: false
      matrix:
        OS: ["ubuntu-latest"]
        OSSHORT: ["linux"]
        include:
          - OS: "windows-latest"
            OSSHORT: "windows"
          - OS: "macos-15-intel"
            OSSHORT: "mac"
          - OS: "macos-14"
            OSSHORT: "mac-arm"
          - OS: "ubuntu-24.04-arm"
            OSSHORT: "linux-arm"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: sudo apt-get install -y nailgun
        if: runner.os == 'Linux'
      - run: .github/scripts/maybe-with-graalvm-home.sh nativeTests
        shell: bash
        timeout-minutes: 35
      - name: Copy artifacts
        run: .github/scripts/maybe-with-graalvm-home.sh copyLauncher --directory artifacts/
        shell: bash
      - name: Build OS packages
        run: .github/scripts/generate-os-packages.sh
        shell: bash
      - uses: actions/attest-build-provenance@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          subject-path: 'artifacts/*'
      - uses: actions/upload-artifact@v7
        with:
          name: launchers-${{ matrix.OSSHORT }}
          path: artifacts/
          if-no-files-found: error
          retention-days: 2

  generate-compat-native-launchers:
    name: linux compat native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: sudo apt-get install -y nailgun
      - run: .github/scripts/maybe-with-graalvm-home.sh nativeCompatTests
        shell: bash
      - name: Test compat launcher under QEMU (Nehalem CPU, no AVX)
        run: .github/scripts/maybe-with-graalvm-home.sh qemuCompatTests
        shell: bash
      - name: Copy artifacts
        run: .github/scripts/maybe-with-graalvm-home.sh copyCompatLauncher --directory artifacts/
        shell: bash
      - uses: actions/attest-build-provenance@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          subject-path: 'artifacts/*'
      - uses: actions/upload-artifact@v7
        with:
          name: launchers-linux-compat
          path: artifacts/
          if-no-files-found: error
          retention-days: 2

  generate-native-static-launcher:
    name: ${{ matrix.OS }} static native
    runs-on: ${{ matrix.OS }}
    strategy:
      fail-fast: false
      matrix:
        OS: ["ubuntu-latest"]
        OSSHORT: ["linux"]
        include:
          - OS: "ubuntu-24.04-arm"
            OSSHORT: "linux-arm"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: sudo apt-get install -y nailgun
        if: runner.os == 'Linux'
      - run: .github/scripts/maybe-with-graalvm-home.sh nativeStaticTests
        shell: bash
      - name: Copy artifacts
        run: .github/scripts/maybe-with-graalvm-home.sh copyStaticLauncher --directory artifacts/
        shell: bash
      - uses: actions/attest-build-provenance@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          subject-path: 'artifacts/*'
      - uses: actions/upload-artifact@v7
        with:
          name: launchers-${{ matrix.OSSHORT }}-static
          path: artifacts/
          if-no-files-found: error
          retention-days: 2

  generate-native-container-launcher:
    name: ${{ matrix.OS }} container native
    runs-on: ${{ matrix.OS }}
    strategy:
      fail-fast: false
      matrix:
        OS: ["ubuntu-latest"]
        OSSHORT: ["linux"]
        include:
          - OS: "ubuntu-24.04-arm"
            OSSHORT: "linux-arm"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: sudo apt-get install -y nailgun
        if: runner.os == 'Linux'
      - run: .github/scripts/maybe-with-graalvm-home.sh nativeContainerTests
        shell: bash
      - name: Copy artifacts
        run: .github/scripts/maybe-with-graalvm-home.sh copyContainerLauncher --directory artifacts/
        shell: bash
      - uses: actions/attest-build-provenance@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          subject-path: 'artifacts/*'
      - uses: actions/upload-artifact@v7
        with:
          name: launchers-${{ matrix.OSSHORT }}-container
          path: artifacts/
          if-no-files-found: error
          retention-days: 2

  generate-standalone-launchers:
    name: ${{ matrix.OS }} standalone jvm
    runs-on: ${{ matrix.OS }}
    strategy:
      fail-fast: false
      matrix:
        OS: ["ubuntu-latest"]
        OSSHORT: ["linux"]
        # uncomment once coursier/setup-action support Windows ARM
        # include:
        #   - OS: "windows-11-arm"
        #     OSSHORT: "windows-arm"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: sudo apt-get install -y nailgun
        if: runner.os == 'Linux'
      - run: ./mill -i standaloneJvmTests
        timeout-minutes: 35
      - name: Copy artifacts
        run: ./mill -i copyStandaloneJvmLauncher --directory artifacts/
      - uses: actions/attest-build-provenance@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          subject-path: 'artifacts/*'
      - uses: actions/upload-artifact@v7
        with:
          name: launchers-${{ matrix.OSSHORT }}-standalone
          path: artifacts/
          if-no-files-found: error
          retention-days: 2

  generate-standalone-launcher-windows-arm-tmp:
    name: windows-11-arm standalone jvm
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: coursier/cache-action@v8
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
      - run: ./mill -i standaloneJvmTests
        timeout-minutes: 35
      - name: Copy artifacts
        run: ./mill -i copyStandaloneJvmLauncher --directory artifacts/
      - uses: actions/attest-build-provenance@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          subject-path: 'artifacts/*'
      - uses: actions/upload-artifact@v7
        with:
          name: launchers-windows-arm-standalone
          path: artifacts/
          if-no-files-found: error
          retention-days: 2

  generate-jar-launchers:
    name: Upload JAR launchers
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/cache-action@v8
      with:
        disableFallback: true
    - name: Wait for sync to Central
      run: ./mill -i waitForSync
    - name: Copy artifacts
      run: ./mill -i copyJarLaunchers
    - uses: actions/attest-build-provenance@v4
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        subject-path: 'artifacts/*'
    - uses: actions/upload-artifact@v7
      with:
        name: launchers-jar
        path: artifacts/
        if-no-files-found: error
        retention-days: 2

  generate-bat-launcher:
    name: Upload bat launcher
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/cache-action@v8
      with:
        disableFallback: true
    - name: Wait for sync to Central
      run: ./mill -i waitForSync
    - name: Copy artifacts
      run: ./mill -i copyBatLauncher
    - uses: actions/attest-build-provenance@v4
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        subject-path: 'artifacts/*'
    - uses: actions/upload-artifact@v7
      with:
        name: launchers-bat
        path: artifacts/
        if-no-files-found: error
        retention-days: 2

  upload-launchers:
    name: Upload launchers to GitHub release assets
    needs:
      - generate-native-launchers
      - generate-compat-native-launchers
      - generate-native-static-launcher
      - generate-native-container-launcher
      - generate-standalone-launchers
      - generate-standalone-launcher-windows-arm-tmp
      - generate-jar-launchers
      - generate-bat-launcher
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        submodules: true
    - uses: coursier/cache-action@v8
      with:
        disableFallback: true
    - uses: actions/download-artifact@v8
      with:
        name: launchers-linux
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-linux-compat
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-linux-arm
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-windows
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-mac
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-mac-arm
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-linux-static
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-linux-arm-static
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-linux-container
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-linux-arm-container
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-linux-standalone
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-windows-arm-standalone
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-jar
        path: artifacts/
    - uses: actions/download-artifact@v8
      with:
        name: launchers-bat
        path: artifacts/
    - run: ./mill -i uploadLaunchers --directory artifacts/
      env:
        UPLOAD_GH_TOKEN: ${{ secrets.GH_TOKEN }}

  update-brew-formula:
    name: Update brew formula
    needs:
      - upload-launchers
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: .github/scripts/scala-cli.sh .github/scripts/UpdateBrewFormula.scala
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  update-website-latest:
    name: Update website (snapshot)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: .github/scripts/setup-mkdocs.sh
      - run: npm install --ignore-scripts && ./mill -i updateWebsite
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  update-website:
    name: Update website
    needs:
      - update-brew-formula
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - uses: actions/setup-node@v6
        with:
          node-version: '18'
      - uses: coursier/cache-action@v8
        with:
          disableFallback: true
      - run: .github/scripts/setup-mkdocs.sh
      - run: npm install --ignore-scripts && ./mill -i updateWebsite
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
